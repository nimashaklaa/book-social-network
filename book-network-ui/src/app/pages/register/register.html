<div class="container-fluid card login-container">
  <h3 class="text-center">Create an account</h3>
  <hr>
  @if(errorMessage().length > 0) {
    <div class="alert alert-danger" role="alert">
      @for(msg of errorMessage(); track msg) {
        <p class="mb-3" >{{msg}}</p>
      }
    </div>
  }
  <div class="mb-3">
    <label for="firstname" class="form-label">First Name</label>
    <input [(ngModel)]="registrationRequest.firstname" type="text" class="form-control" id="firstname" placeholder="John">
  </div>
  <div class="mb-3">
    <label for="lastname" class="form-label">Last Name</label>
    <input [(ngModel)]="registrationRequest.lastname" type="text" class="form-control" id="lastname" placeholder="Doe">
  </div>
  <div class="mb-3">
    <label for="login" class="form-label">Email address</label>
    <input [(ngModel)]="registrationRequest.email" type="email" class="form-control" id="login" placeholder="name@example.com">
  </div>
  <div class="mb-3">
    <label for="password" class="form-label">Password</label>
    <input [(ngModel)]="registrationRequest.password" type="password" class="form-control" id="password" placeholder="Password">
  </div>
  <div class="d-flex justify-content-between mb-3">
    <button (click)="register()"  class="btn btn-primary" type="button">
      <em class="fas fa-sign-in-alt"></em>
      &nbsp;Sign up
    </button>
    <div>
      Already have an account?&nbsp;
      <button (click)="login()" class="btn btn-link" type="button">
        Log in
      </button>
    </div>
  </div>
</div>
