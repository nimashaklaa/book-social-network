<div class="auth-wrapper">
  <div class="auth-card text-center">

    @if(submitted()) {
      @if(isOkay()) {
        <div class="activate-result success">
          <em class="fas fa-check-circle fa-4x text-success mb-3"></em>
          <h2 class="auth-title">Activation Successful!</h2>
          <p class="auth-subtitle">Your account has been activated successfully.</p>
          <button class="btn btn-success btn-lg mt-2" (click)="redirectedToLogin()">
            <em class="fas fa-sign-in-alt"></em>&nbsp;Go to Login
          </button>
        </div>
      } @else {
        <div class="activate-result error">
          <em class="fas fa-times-circle fa-4x text-danger mb-3"></em>
          <h2 class="auth-title">Activation Failed</h2>
          <p class="text-danger">{{message()}}</p>
          <button class="btn btn-outline-danger btn-lg mt-2" (click)="submitted.set(false)">
            <em class="fas fa-redo"></em>&nbsp;Try again
          </button>
        </div>
      }
    } @else {
      <em class="fas fa-envelope-open-text fa-3x text-primary mb-3"></em>
      <h2 class="auth-title">Verify your email</h2>
      <p class="auth-subtitle">Enter the 6-digit code sent to your inbox</p>
      <code-input
        [isCodeHidden]="false"
        [codeLength]="6"
        [code]="'number'"
        (codeCompleted)="onCodeCompleted($event)">
      </code-input>
    }

  </div>
</div>
