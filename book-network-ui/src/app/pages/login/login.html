<div class="auth-wrapper">
  <div class="auth-card">
    <h3 class="auth-title">Welcome back</h3>
    <p class="auth-subtitle">Sign in to your account</p>
    <hr>

    @if(errorMessage().length > 0) {
      <div class="alert alert-danger" role="alert">
        @for(msg of errorMessage(); track msg) {
          <p class="mb-1">{{msg}}</p>
        }
      </div>
    }

    <div class="mb-3">
      <label for="login" class="form-label">Email address</label>
      <input [(ngModel)]="autheRequest.email" type="email" class="form-control" id="login" placeholder="name@example.com">
    </div>
    <div class="mb-3">
      <label for="password" class="form-label">Password</label>
      <input [(ngModel)]="autheRequest.password" type="password" class="form-control" id="password" placeholder="Password">
    </div>

    <div class="d-grid mb-3">
      <button (click)="login()" class="btn btn-primary btn-lg" type="button">
        <em class="fas fa-sign-in-alt"></em>&nbsp;Sign in
      </button>
    </div>

    <p class="text-center text-muted mb-0">
      Don't have an account?
      <button (click)="register()" class="btn btn-link p-0">Register</button>
    </p>
  </div>
</div>
