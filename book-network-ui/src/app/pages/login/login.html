<div class="container-fluid card login-container">
  <h3 class="text-center">Login</h3>
  <hr>
  @if(errorMessage().length > 0) {
    <div class="alert alert-danger" role="alert">
      @for(msg of errorMessage(); track msg) {
        <p class="mb-3" >{{msg}}</p>
      }
    </div>
  }
  <div class="mb-3">
    <label for="login" class="form-label">Email address</label>
    <input [(ngModel)]="autheRequest.email" type="email" class="form-control" id="login" placeholder="name@example.com">
  </div>
  <div class="mb-3">
    <label for="password" class="form-label">Password</label>
    <input [(ngModel)]="autheRequest.password" type="password" class="form-control" id="password" placeholder="Password">
  </div>
  <div class="d-flex justify-content-between mb-3">
    <button (click)="login()"  class="btn btn-primary" type="button">
      <em class="fas fa-sign-in-alt"></em>
      &nbsp;Sign in
    </button>
    <div>
      Don't have an account?&nbsp;
      <button (click)="register()" class="btn btn-link" type="button">
        Register
      </button>
    </div>
  </div>
</div>
