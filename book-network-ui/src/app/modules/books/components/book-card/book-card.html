<div class="book-card card h-100">
  <div class="book-cover-wrapper">
    @if(book.cover) {
      <img [src]="'data:image/jpeg;base64,' + book.cover" class="book-cover" [alt]="book.title">
    } @else {
      <div class="book-cover-placeholder">
        <i class="fas fa-book fa-3x"></i>
      </div>
    }
  </div>

  <div class="card-body d-flex flex-column">
    <h6 class="card-title fw-bold text-truncate" [title]="book.title">{{ book.title }}</h6>
    <p class="card-text text-muted small mb-1">by {{ book.authorName }}</p>

    <div class="rating mb-2">
      @for(star of [1,2,3,4,5]; track star) {
        <i class="fas fa-star" [class.filled]="star <= (book.rate ?? 0)"></i>
      }
      <span class="ms-1 small text-muted">({{ book.rate ?? 0 | number:'1.1-1' }})</span>
    </div>

    <p class="synopsis small text-muted flex-grow-1">{{ book.synopsis }}</p>

    <div class="card-actions mt-auto d-flex gap-2 flex-wrap">
      <button class="btn btn-sm btn-outline-primary flex-grow-1">
        <i class="fas fa-eye"></i> Details
      </button>
      <button class="btn btn-sm btn-primary flex-grow-1" [class.disabled]="book.borrowedByCurrentUser || book.borrowedByAnotherUser" (click)="borrow()">
        <i class="fas fa-bookmark"></i> Borrow
      </button>
      <button class="btn btn-sm btn-outline-danger">
        <i class="fas fa-heart"></i>
      </button>
    </div>
  </div>
</div>
